<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L型雷切盒產生器（無蓋）</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 15px;
      overflow: hidden;
      user-select: none;
    }
    h1 { color: #00d4ff; margin-bottom: 3px; font-size: 1.2rem; text-align: center; }
    .subtitle { color: #666; margin-bottom: 10px; font-size: 0.75rem; text-align: center; }
    
    .main-layout { display: flex; gap: 12px; width: 100%; max-width: 1400px; flex: 1; min-height: 0; }
    
    .controls {
      background: #16213e;
      border-radius: 10px;
      padding: 14px;
      width: 240px;
      flex-shrink: 0;
      overflow-y: auto;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .control-group { margin-bottom: 10px; }
    .control-group label { display: flex; justify-content: space-between; font-size: 0.75rem; margin-bottom: 3px; color: #aaa; }
    .control-group label span { color: #00d4ff; font-weight: bold; }
    input[type="range"] { width: 100%; height: 5px; border-radius: 2px; background: #0f3460; outline: none; -webkit-appearance: none; cursor: pointer; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #00d4ff; cursor: pointer; box-shadow: 0 0 8px rgba(0,212,255,0.5); }
    
    .view-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
    .view-tabs button { flex: 1; padding: 6px 4px; font-size: 0.75rem; border: none; border-radius: 6px; cursor: pointer; background: #0f3460; color: #888; font-weight: 600; transition: all 0.15s; }
    .view-tabs button.active { background: #00d4ff; color: #1a1a2e; }
    
    .info { margin-top: 10px; padding: 8px; background: #0f3460; border-radius: 6px; font-size: 0.7rem; }
    .info-row { display: flex; justify-content: space-between; padding: 1px 0; }
    .info-row span:last-child { color: #00d4ff; }
    
    .btn-group { display: flex; gap: 6px; margin-top: 10px; }
    .btn-group button { flex: 1; padding: 8px 4px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.75rem; transition: all 0.15s; }
    .btn-download { background: #00d4ff; color: #1a1a2e; }
    .btn-download:hover { background: #00b8e6; }
    .btn-svg { background: #e94560; color: white; }
    .btn-svg:hover { background: #d63a54; }
    
    .canvas-wrapper {
      flex: 1;
      background: #16213e;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    
    .zoom-hint {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: #888;
      font-size: 0.65rem;
      padding: 4px 10px;
      border-radius: 10px;
      pointer-events: none;
    }
    
    .rotate-hint {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.6);
      color: #888;
      font-size: 0.65rem;
      padding: 4px 10px;
      border-radius: 10px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <h1>🧊 L型雷切盒產生器（無蓋）</h1>
  <div class="subtitle">即時預覽・雷射切割 SVG 輸出</div>
  
  <div class="main-layout">
    <div class="controls">
      <div class="view-tabs">
        <button id="tab2d" class="active" onclick="setView('2d')">2D 展開</button>
        <button id="tab3d" onclick="setView('3d')">3D 預覽</button>
      </div>
      
      <div class="control-group"><label>底部寬度 (bw) <span id="val-bw">100</span> mm</label><input type="range" id="sl-bw" min="30" max="300" value="100" step="1"></div>
      <div class="control-group"><label>內部階梯水平 (iw) <span id="val-iw">50</span> mm</label><input type="range" id="sl-iw" min="10" max="200" value="50" step="1"></div>
      <div class="control-group"><label>左側總高度 (lh) <span id="val-lh">150</span> mm</label><input type="range" id="sl-lh" min="30" max="400" value="150" step="1"></div>
      <div class="control-group"><label>內部階梯垂直 (ih) <span id="val-ih">90</span> mm</label><input type="range" id="sl-ih" min="10" max="350" value="90" step="1"></div>
      <div class="control-group"><label>右側外牆高度 (rh) <span id="val-rh">60</span> mm</label><input type="range" id="sl-rh" min="10" max="200" value="60" step="1"></div>
      <div class="control-group"><label>深度 (d) <span id="val-d">80</span> mm</label><input type="range" id="sl-d" min="20" max="200" value="80" step="1"></div>
      <div class="control-group"><label>板材厚度 (t) <span id="val-t">3</span> mm</label><input type="range" id="sl-t" min="1" max="10" value="3" step="0.5"></div>
      <div class="control-group"><label>卡榫齒寬 (fj) <span id="val-fj">2</span> mm</label><input type="range" id="sl-fj" min="1" max="8" value="2" step="0.5"></div>

      <div class="info">
        <div class="info-row"><span>上方總寬度 (tw=bw+iw)</span><span id="info-tw">150</span></div>
        <div class="info-row"><span>自動校正 rh</span><span id="info-rh">60</span></div>
        <div class="info-row"><span>幾何驗證</span><span id="info-valid">✓ OK</span></div>
      </div>

      <div class="btn-group">
        <button class="btn-download" onclick="downloadSVG()">📥 SVG</button>
        <button class="btn-svg" onclick="downloadDXF()">📐 DXF</button>
      </div>
    </div>
    
    <div class="canvas-wrapper" id="canvas-holder">
      <div class="zoom-hint" id="zoom-hint">滾輪縮放　拖曳平移</div>
      <div class="rotate-hint" id="rotate-hint" style="display:none">拖曳旋轉 3D</div>
    </div>
  </div>

<script>
// === L-Box Generator Web App ===
p5.disableFriendlyErrors = true;

// --- Parameters ---
let params = {
  bw: 100,  // bottom width
  iw: 50,   // inner step horizontal
  lh: 150,  // left total height
  ih: 90,   // inner step vertical
  rh: 60,   // right outer wall height (auto-corrected: rh = lh - ih)
  d: 80,    // depth
  t: 3,     // thickness
  fj: 2     // finger joint tooth width
};

// --- View state ---
let viewMode = '2d';
let canvasW = 0, canvasH = 0;
let zoom = 1.0;
let panX = 0, panY = 0;
let isDragging = false;
let lastMouseX = 0, lastMouseY = 0;

// --- 3D rotation ---
let rotX = 0.4, rotY = -0.6;
let isRotating3D = false;
let lastRotX = 0, lastRotY = 0;

function setup() {
  let wrapper = document.getElementById('canvas-holder');
  canvasW = wrapper.clientWidth;
  canvasH = wrapper.clientHeight;
  let canvas = createCanvas(canvasW, canvasH);
  canvas.parent('canvas-holder');
  pixelDensity(1);
  
  setupSliders();
  updateInfo();
  noLoop();
}

function setupSliders() {
  const sliders = [
    ['bw', 'sl-bw', 'val-bw'],
    ['iw', 'sl-iw', 'val-iw'],
    ['lh', 'sl-lh', 'val-lh'],
    ['ih', 'sl-ih', 'val-ih'],
    ['rh', 'sl-rh', 'val-rh'],
    ['d', 'sl-d', 'val-d'],
    ['t', 'sl-t', 'val-t'],
    ['fj', 'sl-fj', 'val-fj']
  ];
  
  sliders.forEach(([key, sliderId, valId]) => {
    const slider = document.getElementById(sliderId);
    const valEl = document.getElementById(valId);
    slider.addEventListener('input', () => {
      params[key] = parseFloat(slider.value);
      valEl.textContent = params[key];
      updateInfo();
      redraw();
    });
  });
}

function updateInfo() {
  let tw = params.bw + params.iw;
  let rhAuto = params.lh - params.ih;
  let valid = Math.abs(params.lh - (params.ih + rhAuto)) < 0.01;
  params.rh = rhAuto; // auto-correct
  document.getElementById('info-tw').textContent = tw.toFixed(0);
  document.getElementById('info-rh').textContent = rhAuto.toFixed(0) + (Math.abs(rhAuto - parseFloat(document.getElementById('sl-rh').value)) > 0.5 ? ' (已校正)' : '');
  document.getElementById('info-valid').textContent = valid ? '✓ OK' : '✗ 幾何錯誤';
  document.getElementById('info-valid').style.color = valid ? '#00d4ff' : '#e94560';
}

function setView(mode) {
  viewMode = mode;
  document.getElementById('tab2d').classList.toggle('active', mode === '2d');
  document.getElementById('tab3d').classList.toggle('active', mode === '3d');
  document.getElementById('zoom-hint').style.display = mode === '2d' ? 'block' : 'none';
  document.getElementById('rotate-hint').style.display = mode === '3d' ? 'block' : 'none';
  redraw();
}

function draw() {
  background('#1a1a2e');
  if (viewMode === '2d') draw2D();
  else draw3D();
}

// ======================
// 2D Drawing
// ======================
function draw2D() {
  let s = params.t;  // spacing between parts
  let f = params.fj; // finger joint size
  let t = params.t;  // thickness (used as margin)
  
  let bw = params.bw, iw = params.iw, lh = params.lh;
  let ih = params.ih, rh = params.lh - params.ih; // auto-corrected
  let d = params.d;
  let tw = bw + iw;
  
  // Calculate scale to fit everything with proper margins
  // Layout: front L at top-left, side walls below front L, back L at right of front L
  let totalW = tw + bw + d + s * 6;
  let totalH = lh + d + s * 5;
  
  let availW = canvasW - 60;
  let availH = canvasH - 60;
  let sc = Math.min(availW / totalW, availH / totalH, 3.5);
  
  // Center the entire layout
  let offsetX = (canvasW - totalW * sc) / 2 - 20;
  let offsetY = (canvasH - totalH * sc) / 2 - 20;
  
  push();
  translate(offsetX, offsetY);
  scale(sc);
  
  // --- Draw Front L-face ---
  drawLFace(s, s, bw, ih, iw, rh, tw, lh, f, '前面板', color(0, 180, 220, 50), color(0, 212, 255));
  
  // --- Draw Side Walls (row below front L) ---
  let sideY = s + lh + s;
  
  // Bottom wall (along bottom edge of L, depth d)
  drawRectWall(s, sideY, bw, d, f, '底側板');
  
  // Inner vertical wall (along inner vertical edge of L)
  drawRectWall(s + bw + s, sideY, ih, d, f, '內垂直側板');
  
  // Inner horizontal wall (along inner horizontal edge of L)
  drawRectWall(s + bw + s + ih + s, sideY, iw, d, f, '內水平側板');
  
  // Right outer wall (along right outer vertical of L)
  drawRectWall(s + bw + s + ih + s + iw + s, sideY, rh, d, f, '右垂直側板');
  
  // --- Draw Top Wall (below side walls) ---
  let topY = sideY + d + s;
  drawRectWall(s, topY, tw, d, f, '上頂側板');
  
  // Left back wall (right of top wall)
  drawRectWall(s + tw + s, topY, lh, d, f, '左側背板');
  
  // --- Draw Back L-face (to the right of front L) ---
  let backX = s + tw + d + s * 3;
  drawLFace(backX, s, bw, ih, iw, rh, tw, lh, f, '後面板', color(0, 140, 180, 50), color(0, 180, 220));
  
  pop();
  
  // Draw scale bar
  noStroke();
  fill(255, 100);
  textSize(9);
  textAlign(LEFT, BOTTOM);
  text(`比例: 1px = 1mm  (${sc.toFixed(2)}x 顯示)`, 10, canvasH - 8);
}

// Draw an L-shaped face with finger joints along each edge
// All finger joints are properly ALONG the edges they belong to
function drawLFace(x, y, bw, ih, iw, rh, tw, lh, fj, label, fillCol, strokeCol) {
  push();
  translate(x, y);
  
  // Draw the L-shape fill
  noStroke();
  fill(fillCol);
  beginShape();
  vertex(0, 0);
  vertex(bw, 0);
  vertex(bw, ih);
  vertex(tw, ih);
  vertex(tw, lh);
  vertex(0, lh);
  endShape(CLOSE);
  
  // Draw finger joints along each edge
  stroke(strokeCol);
  strokeWeight(1.2);
  noFill();
  
  // Edge 1: Bottom (bw) - from (0,0) to (bw,0), going RIGHT
  drawFingerLine(0, 0, bw, fj, 'right');
  
  // Edge 2: Inner vertical (ih) - from (bw,0) to (bw,ih), going UP
  drawFingerLine(bw, 0, ih, fj, 'up');
  
  // Edge 3: Inner horizontal (iw) - from (bw,ih) to (tw,ih), going RIGHT
  drawFingerLine(bw, ih, iw, fj, 'right');
  
  // Edge 4: Right outer vertical (rh) - from (tw,ih) to (tw,lh), going UP
  drawFingerLine(tw, ih, rh, fj, 'up');
  
  // Edge 5: Top (tw) - from (tw,lh) to (0,lh), going LEFT
  drawFingerLine(0, lh, tw, fj, 'left');
  
  // Edge 6: Left outer vertical (lh) - from (0,lh) to (0,0), going DOWN
  drawFingerLine(0, lh, lh, fj, 'down');
  
  // Draw label
  noStroke();
  fill(255, 180);
  textSize(8);
  textAlign(CENTER, CENTER);
  text(label, bw / 2, lh / 2);
  
  pop();
}

// Draw a rectangular wall with finger joints on all 4 edges
function drawRectWall(x, y, w, h, fj, label) {
  push();
  translate(x, y);
  
  // Fill
  noStroke();
  fill(0, 130, 180, 35);
  rect(0, 0, w, h);
  
  // Finger joints
  stroke(0, 200, 240, 180);
  strokeWeight(1);
  noFill();
  
  // Edge 0: Left (h) - going UP
  drawFingerLine(0, 0, h, fj, 'up');
  
  // Edge 1: Top (w) - going RIGHT
  drawFingerLine(0, 0, w, fj, 'right');
  
  // Edge 2: Right (h) - going DOWN
  drawFingerLine(w, 0, h, fj, 'down');
  
  // Edge 3: Bottom (w) - going LEFT
  drawFingerLine(0, h, w, fj, 'left');
  
  // Label
  noStroke();
  fill(255, 150);
  textSize(7);
  textAlign(CENTER, CENTER);
  text(label, w / 2, h / 2);
  
  pop();
}

// Draw a line with finger joint pattern along it
// Direction: 'right', 'left', 'up', 'down'
// The line goes FROM (x,y) in the given direction for length 'len'
function drawFingerLine(x, y, len, fj, dir) {
  // Draw a zigzag line representing finger joints
  // Each finger joint cycle = 2 * fj (one out, one in/return)
  let numFingers = Math.floor(len / (fj * 2));
  let actualLen = numFingers * fj * 2;
  let remainder = len - actualLen;
  
  if (dir === 'right') {
    let px = x;
    for (let i = 0; i < numFingers; i++) {
      line(px, y, px + fj, y);
      px += fj;
      line(px, y - 3, px + fj, y - 3);
      px += fj;
    }
    if (remainder > 0) line(px, y, px + remainder, y);
  } else if (dir === 'left') {
    let px = x;
    for (let i = 0; i < numFingers; i++) {
      line(px, y, px - fj, y);
      px -= fj;
      line(px, y - 3, px - fj, y - 3);
      px -= fj;
    }
    if (remainder > 0) line(px, y, px - remainder, y);
  } else if (dir === 'up') {
    let py = y;
    for (let i = 0; i < numFingers; i++) {
      line(x, py, x, py + fj);
      py += fj;
      line(x - 3, py, x - 3, py + fj);
      py += fj;
    }
    if (remainder > 0) line(x, py, x, py + remainder);
  } else if (dir === 'down') {
    let py = y;
    for (let i = 0; i < numFingers; i++) {
      line(x, py, x, py - fj);
      py -= fj;
      line(x - 3, py, x - 3, py - fj);
      py -= fj;
    }
    if (remainder > 0) line(x, py, x, py - remainder);
  }
}

// ======================
// 3D Drawing
// ======================
function draw3D() {
  let bw = params.bw, iw = params.iw, lh = params.lh;
  let ih = params.ih, rh = params.lh - params.ih;
  let d = params.d;
  let tw = bw + iw;
  
  translate(canvasW / 2, canvasH / 2);
  
  // Apply 3D rotation from mouse drag
  rotateX(rotX);
  rotateY(rotY);
  
  // Scale to fit
  let maxDim = Math.max(tw, lh, d) * 1.5;
  scale(180 / maxDim);
  
  // Enable strokes for edges
  noStroke();
  
  // L-shape front face (at z=0)
  fill(0, 180, 220, 180);
  beginShape();
  vertex(0, 0, 0);
  vertex(bw, 0, 0);
  vertex(bw, ih, 0);
  vertex(tw, ih, 0);
  vertex(tw, lh, 0);
  vertex(0, lh, 0);
  endShape(CLOSE);
  
  // Top face
  fill(0, 200, 240, 160);
  beginShape();
  vertex(0, lh, 0);
  vertex(tw, lh, 0);
  vertex(tw, lh, d);
  vertex(0, lh, d);
  endShape(CLOSE);
  
  // Right face (at x=tw)
  fill(0, 140, 180, 160);
  beginShape();
  vertex(tw, ih, 0);
  vertex(tw, lh, 0);
  vertex(tw, lh, d);
  vertex(tw, ih, d);
  endShape(CLOSE);
  
  // Inner step top face
  fill(0, 190, 230, 160);
  beginShape();
  vertex(bw, ih, 0);
  vertex(tw, ih, 0);
  vertex(tw, ih, d);
  vertex(bw, ih, d);
  endShape(CLOSE);
  
  // Bottom face
  fill(0, 100, 140, 140);
  beginShape();
  vertex(0, 0, 0);
  vertex(bw, 0, 0);
  vertex(bw, 0, d);
  vertex(0, 0, d);
  endShape(CLOSE);
  
  // Left outer face (at x=0)
  fill(0, 120, 160, 120);
  beginShape();
  vertex(0, 0, 0);
  vertex(0, lh, 0);
  vertex(0, lh, d);
  vertex(0, 0, d);
  endShape(CLOSE);
  
  // Back/depth face (at z=d)  
  fill(0, 80, 120, 100);
  beginShape();
  vertex(0, 0, d);
  vertex(bw, 0, d);
  vertex(bw, ih, d);
  vertex(tw, ih, d);
  vertex(tw, lh, d);
  vertex(0, lh, d);
  endShape(CLOSE);
  
  // Draw dimension labels
  fill(255, 200);
  textSize(14);
  textAlign(LEFT, CENTER);
  resetMatrix();
  text(`L型盒子 3D 預覽`, -canvasW/2 + 15, -canvasH/2 + 25);
  textSize(11);
  fill(0, 212, 255);
  text(`底部: ${params.bw}mm × ${params.d}mm`, -canvasW/2 + 15, -canvasH/2 + 45);
  text(`高度: ${params.lh}mm`, -canvasW/2 + 15, -canvasH/2 + 60);
  text(`深度: ${params.d}mm`, -canvasW/2 + 15, -canvasH/2 + 75);
}

// ======================
// Mouse / Touch Controls
// ======================
function mouseWheel(event) {
  if (viewMode !== '2d') return false;
  
  let delta = event.delta;
  if (delta > 0) zoom *= 0.9;
  else zoom *= 1.1;
  zoom = constrain(zoom, 0.2, 5.0);
  redraw();
  return false;
}

function mouseDragged() {
  if (viewMode === '2d') {
    // Pan in 2D
    if (!isDragging) {
      isDragging = true;
      lastMouseX = mouseX;
      lastMouseY = mouseY;
    }
    panX += (mouseX - lastMouseX);
    panY += (mouseY - lastMouseY);
    lastMouseX = mouseX;
    lastMouseY = mouseY;
    redraw();
  } else {
    // Rotate in 3D
    if (!isRotating3D) {
      isRotating3D = true;
      lastRotX = mouseX;
      lastRotY = mouseY;
    }
    let dx = mouseX - lastRotX;
    let dy = mouseY - lastRotY;
    rotY += dx * 0.01;
    rotX += dy * 0.01;
    // Clamp rotX to avoid flipping
    rotX = constrain(rotX, -Math.PI/2 + 0.1, Math.PI/2 - 0.1);
    lastRotX = mouseX;
    lastRotY = mouseY;
    redraw();
  }
  return false;
}

function mouseReleased() {
  isDragging = false;
  isRotating3D = false;
}

function doubleClicked() {
  // Reset view
  zoom = 1.0;
  panX = 0;
  panY = 0;
  rotX = 0.4;
  rotY = -0.6;
  redraw();
}

function windowResized() {
  let wrapper = document.getElementById('canvas-holder');
  canvasW = wrapper.clientWidth;
  canvasH = wrapper.clientHeight;
  resizeCanvas(canvasW, canvasH);
  redraw();
}

// ======================
// SVG / DXF Export
// ======================
function generateSVG() {
  let t = params.t, s = 3; // 3px per mm for SVG
  let bw = params.bw * s, iw = params.iw * s, lh = params.lh * s;
  let ih = params.ih * s, rh = (params.lh - params.ih) * s;
  let d = params.d * s, tw = bw + iw;
  let fj = params.fj * s;
  
  // Layout with spacing
  let gap = t * 2;
  let totalW = tw + bw + d + gap * 6;
  let totalH = lh + d + gap * 5;
  
  let svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${totalW} ${totalH}" width="${totalW}" height="${totalH}">
<style>
  .face { fill: none; stroke: #000; stroke-width: 0.5; }
  .fj { fill: none; stroke: #666; stroke-width: 0.3; }
  .label { font-family: Arial, sans-serif; font-size: 8px; fill: #333; text-anchor: middle; }
</style>
<rect width="${totalW}" height="${totalH}" fill="#fff"/>
<!-- 前面板 L型 -->
<g transform="translate(${gap}, ${gap})">
  <path class="face" d="M0,0 L${bw},0 L${bw},${ih} L${tw},${ih} L${tw},${lh} L0,${lh} Z"/>
  <text x="${bw/2}" y="${lh/2}" class="label">前面板</text>
  <path class="fj" d="${buildFingerPathSVG(0, 0, bw, fj, 'right')}"/>
  <path class="fj" d="${buildFingerPathSVG(bw, 0, ih, fj, 'up')}"/>
  <path class="fj" d="${buildFingerPathSVG(bw, ih, iw, fj, 'right')}"/>
  <path class="fj" d="${buildFingerPathSVG(tw, ih, rh, fj, 'up')}"/>
  <path class="fj" d="${buildFingerPathSVG(0, lh, tw, fj, 'left')}"/>
  <path class="fj" d="${buildFingerPathSVG(0, lh, lh, fj, 'down')}"/>
</g>
<!-- 側板群組 -->
<g transform="translate(${gap}, ${gap + lh + gap})">
  <g><rect class="face" x="0" y="0" width="${bw}" height="${d}"/><text x="${bw/2}" y="${d/2}" class="label">底側板</text></g>
  <g transform="translate(${bw + gap}, 0)"><rect class="face" x="0" y="0" width="${ih}" height="${d}"/><text x="${ih/2}" y="${d/2}" class="label">內垂直側板</text></g>
  <g transform="translate(${bw + gap + ih + gap}, 0)"><rect class="face" x="0" y="0" width="${iw}" height="${d}"/><text x="${iw/2}" y="${d/2}" class="label">內水平側板</text></g>
  <g transform="translate(${bw + gap + ih + gap + iw + gap}, 0)"><rect class="face" x="0" y="0" width="${rh}" height="${d}"/><text x="${rh/2}" y="${d/2}" class="label">右垂直側板</text></g>
</g>
<!-- 上側板群組 -->
<g transform="translate(${gap}, ${gap + lh + gap + d + gap})">
  <g><rect class="face" x="0" y="0" width="${tw}" height="${d}"/><text x="${tw/2}" y="${d/2}" class="label">上頂側板</text></g>
  <g transform="translate(${tw + gap}, 0)"><rect class="face" x="0" y="0" width="${lh}" height="${d}"/><text x="${lh/2}" y="${d/2}" class="label">左側背板</text></g>
</g>
<!-- 後面板 L型 -->
<g transform="translate(${gap + tw + d + gap * 3}, ${gap})">
  <path class="face" d="M0,0 L${bw},0 L${bw},${ih} L${tw},${ih} L${tw},${lh} L0,${lh} Z"/>
  <text x="${bw/2}" y="${lh/2}" class="label">後面板</text>
  <path class="fj" d="${buildFingerPathSVG(0, 0, bw, fj, 'right')}"/>
  <path class="fj" d="${buildFingerPathSVG(bw, 0, ih, fj, 'up')}"/>
  <path class="fj" d="${buildFingerPathSVG(bw, ih, iw, fj, 'right')}"/>
  <path class="fj" d="${buildFingerPathSVG(tw, ih, rh, fj, 'up')}"/>
  <path class="fj" d="${buildFingerPathSVG(0, lh, tw, fj, 'left')}"/>
  <path class="fj" d="${buildFingerPathSVG(0, lh, lh, fj, 'down')}"/>
</g>
</svg>`;
  return svg;
}

// Build SVG path string for finger joints
function buildFingerPathSVG(x, y, len, fj, dir) {
  let numFingers = Math.floor(len / (fj * 2));
  let actualLen = numFingers * fj * 2;
  let remainder = len - actualLen;
  let d = '';
  
  if (dir === 'right') {
    let px = x;
    for (let i = 0; i < numFingers; i++) {
      d += `M${px},${y}L${px+fj},${y} `;
      px += fj;
      d += `M${px},${y-3}L${px+fj},${y-3} `;
      px += fj;
    }
    if (remainder > 0) d += `M${px},${y}L${px+remainder},${y} `;
  } else if (dir === 'left') {
    let px = x;
    for (let i = 0; i < numFingers; i++) {
      d += `M${px},${y}L${px-fj},${y} `;
      px -= fj;
      d += `M${px},${y-3}L${px-fj},${y-3} `;
      px -= fj;
    }
    if (remainder > 0) d += `M${px},${y}L${px-remainder},${y} `;
  } else if (dir === 'up') {
    let py = y;
    for (let i = 0; i < numFingers; i++) {
      d += `M${x},${py}L${x},${py+fj} `;
      py += fj;
      d += `M${x-3},${py}L${x-3},${py+fj} `;
      py += fj;
    }
    if (remainder > 0) d += `M${x},${py}L${x},${py+remainder} `;
  } else if (dir === 'down') {
    let py = y;
    for (let i = 0; i < numFingers; i++) {
      d += `M${x},${py}L${x},${py-fj} `;
      py -= fj;
      d += `M${x-3},${py}L${x-3},${py-fj} `;
      py -= fj;
    }
    if (remainder > 0) d += `M${x},${py}L${x},${py-remainder} `;
  }
  return d;
}

function downloadSVG() {
  let svg = generateSVG();
  let blob = new Blob([svg], { type: 'image/svg+xml' });
  let url = URL.createObjectURL(blob);
  let a = document.createElement('a');
  a.href = url;
  a.download = `Lbox_${params.bw}x${params.lh}x${params.d}_lidless.svg`;
  a.click();
  URL.revokeObjectURL(url);
}

function downloadDXF() {
  let bw = params.bw, iw = params.iw, lh = params.lh;
  let ih = params.ih, rh = params.lh - params.ih;
  let d = params.d, tw = bw + iw;
  
  // Simple DXF with just the L-shape outline
  let dxf = `0
SECTION
2
HEADER
0
ENDSEC
0
SECTION
2
ENTITIES
0
POLYLINE
8
1
66
1
70
1
`;
  // Front L-shape vertices
  let pts = [[0,0],[bw,0],[bw,ih],[tw,ih],[tw,lh],[0,lh]];
  pts.forEach(p => {
    dxf += `0
VERTEX
8
1
10
${p[0]}
20
${p[1]}
30
0
`;
  });
  dxf += `0
SEQEND
8
1
0
ENDSEC
0
EOF`;
  
  let blob = new Blob([dxf], { type: 'application/dxf' });
  let url = URL.createObjectURL(blob);
  let a = document.createElement('a');
  a.href = url;
  a.download = `Lbox_${bw}x${lh}x${d}_lidless.dxf`;
  a.click();
  URL.revokeObjectURL(url);
}
