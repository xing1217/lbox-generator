<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L型雷切盒產生器 (無蓋)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 { color: #00d4ff; margin-bottom: 5px; font-size: 1.4rem; }
    .subtitle { color: #888; margin-bottom: 15px; font-size: 0.85rem; }
    .container { display: flex; gap: 20px; max-width: 1400px; width: 100%; flex-wrap: wrap; justify-content: center; }
    .controls { background: #16213e; border-radius: 12px; padding: 20px; min-width: 280px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .control-group { margin-bottom: 15px; }
    .control-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 5px; color: #aaa; }
    .control-group label span { color: #00d4ff; font-weight: bold; }
    input[type="range"] { width: 100%; height: 6px; border-radius: 3px; background: #0f3460; outline: none; -webkit-appearance: none; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #00d4ff; cursor: pointer; box-shadow: 0 0 10px rgba(0,212,255,0.5); }
    .canvas-container { background: #16213e; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .btn-group { display: flex; gap: 10px; margin-top: 15px; }
    button { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.2s; }
    .btn-download { background: #00d4ff; color: #1a1a2e; }
    .btn-download:hover { background: #00b8e6; }
    .btn-svg { background: #e94560; color: white; }
    .btn-svg:hover { background: #d63a54; }
    .info { margin-top: 15px; padding: 10px; background: #0f3460; border-radius: 8px; font-size: 0.75rem; color: #888; }
    .info-row { display: flex; justify-content: space-between; padding: 2px 0; }
    .info-row span:last-child { color: #00d4ff; }
    .view-tabs { display: flex; gap: 5px; margin-bottom: 10px; }
    .view-tabs button { flex: 1; padding: 8px; font-size: 0.8rem; background: #0f3460; color: #888; }
    .view-tabs button.active { background: #00d4ff; color: #1a1a2e; }
  </style>
</head>
<body>
  <h1>🧊 L型雷切盒產生器（無蓋）</h1>
  <div class="subtitle">調整參數即時預覽・下載 SVG 雷射切割</div>
  
  <div class="container">
    <div class="controls">
      <div class="view-tabs">
        <button id="tab2d" class="active" onclick="setView('2d')">2D 平面</button>
        <button id="tab3d" onclick="setView('3d')">3D 預覽</button>
      </div>
      
      <div class="control-group"><label>底部寬度 (bw) <span id="val-bw">100</span> mm</label><input type="range" id="sl-bw" min="30" max="300" value="100" step="1"></div>
      <div class="control-group"><label>內部階梯水平 (iw) <span id="val-iw">50</span> mm</label><input type="range" id="sl-iw" min="10" max="200" value="50" step="1"></div>
      <div class="control-group"><label>左側總高度 (lh) <span id="val-lh">150</span> mm</label><input type="range" id="sl-lh" min="30" max="400" value="150" step="1"></div>
      <div class="control-group"><label>內部階梯垂直 (ih) <span id="val-ih">90</span> mm</label><input type="range" id="sl-ih" min="10" max="350" value="90" step="1"></div>
      <div class="control-group"><label>右側外牆高度 (rh) <span id="val-rh">60</span> mm</label><input type="range" id="sl-rh" min="10" max="200" value="60" step="1"></div>
      <div class="control-group"><label>深度 / 厚度 (d) <span id="val-d">80</span> mm</label><input type="range" id="sl-d" min="20" max="200" value="80" step="1"></div>
      <div class="control-group"><label>板材厚度 (t) <span id="val-t">3</span> mm</label><input type="range" id="sl-t" min="1" max="10" value="3" step="0.5"></div>
      <div class="control-group"><label>卡榫尺寸 (fj) <span id="val-fj">2</span> mm</label><input type="range" id="sl-fj" min="1" max="8" value="2" step="0.5"></div>

      <div class="info">
        <div class="info-row"><span>上方總寬度 (tw)</span><span id="info-tw">150</span></div>
        <div class="info-row"><span>自動校正 rh</span><span id="info-rh">60</span></div>
        <div class="info-row"><span>幾何驗證</span><span id="info-valid">✓ OK</span></div>
      </div>

      <div class="btn-group">
        <button class="btn-download" onclick="downloadSVG()">📥 下載 SVG</button>
        <button class="btn-svg" onclick="downloadDXF()">📐 下載 DXF</button>
      </div>
    </div>
    
    <div class="canvas-container"><div id="canvas-holder"></div></div>
  </div>

<script>
p5.disableFriendlyErrors = true;
let viewMode = '2d';
let params = { bw: 100, iw: 50, lh: 150, ih: 90, rh: 60, d: 80, t: 3, fj: 2 };
let scale = 1.5;

function setup() {
  let canvas = createCanvas(800, 600);
  canvas.parent('canvas-holder');
  pixelDensity(1);
  noLoop();
  setupSliders();
  redraw();
}

function setupSliders() {
  const sliders = [['bw','sl-bw','val-bw'],['iw','sl-iw','val-iw'],['lh','sl-lh','val-lh'],['ih','sl-ih','val-ih'],['rh','sl-rh','val-rh'],['d','sl-d','val-d'],['t','sl-t','val-t'],['fj','sl-fj','val-fj']];
  sliders.forEach(([key, sliderId, valId]) => {
    const slider = document.getElementById(sliderId);
    const valEl = document.getElementById(valId);
    slider.addEventListener('input', () => {
      params[key] = parseFloat(slider.value);
      valEl.textContent = params[key];
      updateInfo();
      redraw();
    });
  });
  updateInfo();
}

function updateInfo() {
  let tw = params.bw + params.iw;
  let rhAuto = params.lh - params.ih;
  let valid = Math.abs(params.lh - (params.ih + rhAuto)) < 0.01;
  document.getElementById('info-tw').textContent = tw.toFixed(1);
  document.getElementById('info-rh').textContent = rhAuto.toFixed(1) + (Math.abs(rhAuto - params.rh) > 0.5 ? ' (已校正)' : '');
  document.getElementById('info-valid').textContent = valid ? '✓ OK' : '✗ 幾何錯誤';
  document.getElementById('info-valid').style.color = valid ? '#00d4ff' : '#e94560';
}

function setView(mode) {
  viewMode = mode;
  document.getElementById('tab2d').classList.toggle('active', mode === '2d');
  document.getElementById('tab3d').classList.toggle('active', mode === '3d');
  redraw();
}

function draw() {
  background('#1a1a2e');
  if (viewMode === '2d') draw2D();
  else draw3D();
  noStroke();
  fill(0, 212, 255, 50);
  textSize(10);
  textAlign(RIGHT, BOTTOM);
  text('L型無蓋盒 2D 展開圖', width - 10, height - 10);
}

function draw2D() {
  let t = params.t * scale, s = scale;
  let bw = params.bw * s, iw = params.iw * s, lh = params.lh * s;
  let ih = params.ih * s, rh = params.lh - params.ih; rh *= s;
  let d = params.d * s, tw = bw + iw, fj = params.fj * s;
  let totalW = tw + 4 * t + d + 50, totalH = lh + 2 * t + d + 50;
  let ox = (width - totalW) / 2 + 25, oy = (height - totalH) / 2 + 25;
  translate(ox, oy);
  let colFace = color(0, 180, 220, 60), colEdge = color(0, 212, 255, 200);
  let colFinger = color(255, 180, 0, 150), colText = color(255);
  drawLFingerJoint(0, 0, bw, ih, iw, rh, tw, lh, t, fj, colFace, colEdge, colFinger, colText, '前面板');
  let yOffset = lh + t + 20;
  drawRectWall(t, yOffset, bw, d, '底側板', t, fj);
  drawRectWall(t + bw + t, yOffset, ih, d, '內垂直側板', t, fj);
  drawRectWall(t + bw + t + ih + t, yOffset, iw, d, '內水平側板', t, fj);
  drawRectWall(t + bw + t + ih + t + iw + t, yOffset, rh, d, '右垂直側板', t, fj);
  let yOffset2 = yOffset + d + t + 20;
  drawRectWall(t, yOffset2, tw, d, '上頂側板', t, fj);
  drawRectWall(t + tw + t, yOffset2 - (lh - t), lh, d, '左側背板', t, fj);
  let backY = -lh - t - 20;
  drawLFingerJoint(t + tw + d + t * 3 + 40, backY, bw, ih, iw, rh, tw, lh, t, fj, colFace, colEdge, colFinger, colText, '後面板');
}

function drawLFingerJoint(x, y, bw, ih, iw, rh, tw, lh, t, fj, colFace, colEdge, colFinger, colText, label) {
  push();
  translate(x, y);
  stroke(colEdge);
  strokeWeight(1.5);
  noFill();
  drawFingerEdge(0, 0, bw, fj, 'h');           // 底部 (bw)
  drawFingerEdge(bw, 0, ih, fj, 'v');           // 右內垂直 (ih)
  drawFingerEdge(bw, ih, iw, fj, 'h');         // 內部水平 (iw)
  drawFingerEdge(tw, ih, rh, fj, 'v');         // 右外垂直 (rh)
  drawFingerEdge(0, lh, tw, fj, 'h');          // 上方 (tw) — 左到右
  drawFingerEdge(0, lh, lh, fj, 'v');          // 左側 (lh)
  noStroke();
  fill(colFace);
  beginShape();
  vertex(0, 0); vertex(bw, 0); vertex(bw, ih); vertex(tw, ih); vertex(tw, lh); vertex(0, lh);
  endShape(CLOSE);
  noStroke();
  fill(colText);
  textSize(9);
  textAlign(CENTER, CENTER);
  text(label, bw / 2, lh / 2);
  pop();
}

function drawFingerEdge(x, y, len, fj, dir) {
  let numFingers = Math.floor(len / (fj * 2));
  let actualLen = numFingers * fj * 2;
  let remainder = len - actualLen;
  if (dir === 'h') {
    let px = x;
    for (let i = 0; i < numFingers; i++) {
      line(px, y, px + fj, y); px += fj;
      line(px, y - 3, px + fj, y - 3); px += fj;
    }
    if (remainder > 0) line(px, y, px + remainder, y);
  } else {
    let py = y;
    for (let i = 0; i < numFingers; i++) {
      line(x, py, x, py + fj); py += fj;
      line(x - 3, py, x - 3, py + fj); py += fj;
    }
    if (remainder > 0) line(x, py, x, py + remainder);
  }
}

function drawRectWall(x, y, w, h, label, t, fj) {
  push();
  translate(x, y);
  stroke(0, 212, 255, 200);
  strokeWeight(1);
  noFill();
  rect(0, 0, w, h);
  drawFingerEdge(0, 0, h, fj, 'v');
  drawFingerEdge(0, 0, w, fj, 'h');
  drawFingerEdge(w, 0, h, fj, 'v');
  drawFingerEdge(0, h, w, fj, 'h');
  noStroke();
  fill(0, 150, 200, 40);
  rect(0, 0, w, h);
  fill(255, 255, 255, 200);
  textSize(8);
  textAlign(CENTER, CENTER);
  text(label, w / 2, h / 2);
  pop();
}

function draw3D() {
  let t = params.t * scale, s = scale;
  let bw = params.bw * s, iw = params.iw * s, lh = params.lh * s;
  let ih = params.ih * s, rh = params.lh - params.ih; rh *= s;
  let d = params.d * s, tw = bw + iw;
  translate(width / 2, height / 2);
  let angle = Math.PI / 6, cosA = Math.cos(angle), sinA = Math.sin(angle);
  let project = (px, py, pz) => [ (px - pz) * cosA, py + (px + pz) * sinA ];
  let colFront = color(0, 180, 220, 180), colRight = color(0, 140, 180, 180);
  let colTop = color(0, 200, 240, 180), colLeft = color(0, 120, 160, 100);
  noStroke();
  fill(colFront);
  beginShape();
  let pts = [[0,0,0],[bw,0,0],[bw,ih,0],[tw,ih,0],[tw,lh,0],[0,lh,0]];
  pts.forEach(p => { let [x,y] = project(p[0],p[1],p[2]); vertex(x,y); });
  endShape(CLOSE);
  fill(colRight);
  beginShape();
  [[bw,0,d],[bw,ih,d],[tw,ih,d],[tw,lh,d],[tw,lh,0],[tw,ih,0],[bw,ih,0],[bw,0,0]].forEach(p => { let [x,y] = project(p[0],p[1],p[2]); vertex(x,y); });
  endShape(CLOSE);
  fill(colTop);
  beginShape();
  [[0,lh,d],[tw,lh,d],[tw,lh,0],[0,lh,0]].forEach(p => { let [x,y] = project(p[0],p[1],p[2]); vertex(x,y); });
  endShape(CLOSE);
  fill(colLeft);
  beginShape();
  [[0,lh,d],[0,lh,0],[0,0,0],[0,0,d]].forEach(p => { let [x,y] = project(p[0],p[1],p[2]); vertex(x,y); });
  endShape(CLOSE);
  fill(color(0, 100, 140, 150));
  beginShape();
  [[0,0,d],[bw,0,d],[bw,0,0],[0,0,0]].forEach(p => { let [x,y] = project(p[0],p[1],p[2]); vertex(x,y); });
  endShape(CLOSE);
  fill(255, 200);
  textSize(12);
  textAlign(LEFT, CENTER);
  text('L型盒子 3D 預覽', -width/2 + 20, -height/2 + 30);
  textSize(10);
  fill(0, 212, 255);
  text('底部: ' + params.bw + 'mm × ' + params.d + 'mm', -width/2 + 20, -height/2 + 50);
  text('高度: ' + params.lh + 'mm', -width/2 + 20, -height/2 + 65);
  text('深度: ' + params.d + 'mm', -width/2 + 20, -height/2 + 80);
  textAlign(RIGHT, CENTER);
  fill(255, 150);
  textSize(9);
  text('無蓋 Lidless', width/2 - 20, -height/2 + 30);
}

function generateSVG() {
  let t = params.t, s = 3;
  let bw = params.bw * s, iw = params.iw * s, lh = params.lh * s;
  let ih = params.ih * s, rh = params.lh - params.ih; rh *= s;
  let d = params.d * s, tw = bw + iw, fj = params.fj * s;
  let margin = 20;
  let totalW = tw + 4 * t + d + margin * 3;
  let totalH = lh + 2 * t + d + margin * 4;
  return `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${totalW} ${totalH}" width="${totalW}" height="${totalH}">
  <style>.face { fill: none; stroke: #000; stroke-width: 0.5; } .label { font-family: Arial; font-size: 8px; fill: #333; }</style>
  <rect width="100%" height="100%" fill="#fff"/>
  <g transform="translate(${margin}, ${margin})">
    <path class="face" d="M0,0 L${bw},0 L${bw},${ih} L${tw},${ih} L${tw},${lh} L0,${lh} Z"/>
    <text x="${bw/2}" y="${lh/2}" class="label" text-anchor="middle">前面板</text>
  </g>
  <g transform="translate(${margin}, ${margin + lh + t + 20})">
    <g><rect class="face" x="0" y="0" width="${bw}" height="${d}"/><text x="${bw/2}" y="${d/2}" class="label" text-anchor="middle">底側板</text></g>
    <g transform="translate(${bw + t}, 0)"><rect class="face" x="0" y="0" width="${ih}" height="${d}"/><text x="${ih/2}" y="${d/2}" class="label" text-anchor="middle">內垂直側板</text></g>
    <g transform="translate(${bw + t + ih + t}, 0)"><rect class="face" x="0" y="0" width="${iw}" height="${d}"/><text x="${iw/2}" y="${d/2}" class="label" text-anchor="middle">內水平側板</text></g>
    <g transform="translate(${bw + t + ih + t + iw + t}, 0)"><rect class="face" x="0" y="0" width="${rh}" height="${d}"/><text x="${rh/2}" y="${d/2}" class="label" text-anchor="middle">右垂直側板</text></g>
  </g>
  <g transform="translate(${margin}, ${margin + lh + t + d + t + 30})">
    <g><rect class="face" x="0" y="0" width="${tw}" height="${d}"/><text x="${tw/2}" y="${d/2}" class="label" text-anchor="middle">上頂側板</text></g>
    <g transform="translate(${tw + t}, 0)"><rect class="face" x="0" y="0" width="${lh}" height="${d}"/><text x="${lh/2}" y="${d/2}" class="label" text-anchor="middle">左側背板</text></g>
  </g>
  <g transform="translate(${margin + tw + d + t * 3 + 50}, ${margin})">
    <path class="face" d="M0,0 L${bw},0 L${bw},${ih} L${tw},${ih} L${tw},${lh} L0,${lh} Z"/>
    <text x="${bw/2}" y="${lh/2}" class="label" text-anchor="middle">後面板</text>
  </g>
</svg>`;
}

function downloadSVG() {
  let svg = generateSVG();
  let blob = new Blob([svg], { type: 'image/svg+xml' });
  let url = URL.createObjectURL(blob);
  let a = document.createElement('a');
  a.href = url;
  a.download = 'Lbox_' + params.bw + 'x' + params.lh + 'x' + params.d + '_lidless.svg';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadDXF() {
  let d = params.d, bw = params.bw, iw = params.iw, lh = params.lh, ih = params.ih;
  let rh = params.lh - params.ih, tw = bw + iw;
  let dxf = '0\nSECTION\n2\nHEADER\n0\nENDSEC\n0\nSECTION\n2\nENTITIES\n0\nPOLYLINE\n8\n1\n66\n1\n70\n1\n';
  [[0,0],[bw,0],[bw,ih],[tw,ih],[tw,lh],[0,lh]].forEach(p => {
    dxf += '0\nVERTEX\n8\n1\n10\n' + p[0] + '\n20\n' + p[1] + '\n30\n0\n';
  });
  dxf += '0\nSEQEND\n8\n1\n0\nENDSEC\n0\nEOF';
  let blob = new Blob([dxf], { type: 'application/dxf' });
  let url = URL.createObjectURL(blob);
  let a = document.createElement('a');
  a.href = url;
  a.download = 'Lbox_' + bw + 'x' + lh + 'x' + d + '_lidless.dxf';
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
